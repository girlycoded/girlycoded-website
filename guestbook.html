<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="res/little-41.gif" type="image/x-icon">
	<link rel="stylesheet" href="style.css">
	<title>Girlycoded's Guestbook</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
	<body>
		<div id="page" class="border">
			<!--# include file="public/components/header.html" -->
			<div id="site-information">
				<div id="navbar" class="border textarea"> <!--# include file="public/components/navbar.html" --> </div>
				<div id="guestbook-messages" class="border textarea overflow height-small">
					<h2>Guestbook messages</h2>
				</div>
			</div>
			<div id="side-content" class="border textarea">
				<form id="message-form">
					<h2>Guestbook</h2>
					<input type="text" name="name" placeholder="Name">
					<br>
					<textarea name="message" placeholder="Message"></textarea>
					<br>
					<input type="submit" value="Post">
				</form>
			</div>
			<!--# include file="public/components/footer.html" -->
		</div>
		<script type="module" src="public/guestbook.js"></script>
		<script nomodule src="guestbook.js"></script>
	</body>
</html>
