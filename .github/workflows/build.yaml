on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    name: deploy2nekoweb
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      # your build step here
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        
      - name: deploy2nekoweb
        uses: indiefellas/deploy2nekoweb@main
        with:
          nekoweb-api-key: ${{ secrets.NEKOWEB_API_KEY }}
          nekoweb-domain: 'girlycoded.nekoweb.org'
          nekoweb-username: 'girlycoded'
          directory: 'dist'